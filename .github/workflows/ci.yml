name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  modern-ui-checks:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: modern-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf

      - name: Install frontend dependencies
        working-directory: modern-ui
        run: npm ci

      - name: Build frontend
        working-directory: modern-ui
        run: npm run build

      - name: Check Rust backend
        working-directory: modern-ui/src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: modern-ui/src-tauri
        run: cargo test
