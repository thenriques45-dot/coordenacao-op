name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-modern:
    name: build-modern-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact-name: modern-windows-artifacts
            artifact-path: |
              modern-ui/src-tauri/target/release/bundle/nsis/*_x64-setup.exe
              modern-ui/src-tauri/target/release/bundle/nsis/*_x64-setup.exe.sig
          - platform: linux
            os: ubuntu-22.04
            artifact-name: modern-linux-artifacts
            artifact-path: |
              modern-ui/src-tauri/target/release/bundle/appimage/*.AppImage
              modern-ui/src-tauri/target/release/bundle/appimage/*.AppImage.sig

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: modern-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf

      - name: Install frontend dependencies
        working-directory: modern-ui
        run: npm ci

      - name: Validate updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Configure o secret TAURI_SIGNING_PRIVATE_KEY para gerar releases com self-update."
          }

      - name: Build Tauri updater artifacts
        working-directory: modern-ui
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload modern artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  publish:
    needs: [build-modern]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download modern windows artifact
        uses: actions/download-artifact@v5
        with:
          name: modern-windows-artifacts
          path: artifacts

      - name: Download modern linux artifact
        uses: actions/download-artifact@v5
        with:
          name: modern-linux-artifacts
          path: artifacts

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = (Get-Content modern-ui/package.json | ConvertFrom-Json).version
          $windowsInstaller = Get-ChildItem artifacts/*_x64-setup.exe | Select-Object -First 1
          $windowsSignature = Get-Content -Raw "$($windowsInstaller.FullName).sig"
          $linuxInstaller = Get-ChildItem artifacts/*.AppImage | Select-Object -First 1
          $linuxSignature = Get-Content -Raw "$($linuxInstaller.FullName).sig"

          $latest = [ordered]@{
            version = $version
            notes = "Atualizacao do CoordenacaoOP."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $windowsSignature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($windowsInstaller.Name)"
              }
              "linux-x86_64" = [ordered]@{
                signature = $linuxSignature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($linuxInstaller.Name)"
              }
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Out-File -FilePath artifacts/latest.json -Encoding utf8

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Prepare release notes
        run: |
          cat > artifacts/RELEASE_NOTES.txt <<'EOF'
          CoordenacaoOP 2.0 marca a modern-ui como versao oficial do aplicativo.

          Esta release publica os instaladores Tauri para Windows e Linux, com assinaturas do updater e latest.json para autoatualizacao.
          EOF

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/RELEASE_NOTES.txt
          files: |
            artifacts/*
          generate_release_notes: true
