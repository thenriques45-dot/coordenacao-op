name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      signing-enabled: ${{ steps.detect-signing.outputs.enabled }}
    env:
      COORDENACAOOP_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set release version file
        shell: pwsh
        run: |
          "${{ github.ref_name }}" | Out-File -FilePath VERSION -Encoding utf8 -NoNewline

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build EXE
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Detect code signing config
        id: detect-signing
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGN_PFX_B64) -or [string]::IsNullOrWhiteSpace($env:CODESIGN_PFX_PASSWORD)) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Assinatura desabilitada: secrets ausentes."
          } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Assinatura habilitada."
          }

      - name: Restore code signing certificate
        if: steps.detect-signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\codesign.pfx",
            [Convert]::FromBase64String($env:CODESIGN_PFX_B64)
          )

      - name: Sign EXE
        if: steps.detect-signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
          CODESIGN_TIMESTAMP_URL: ${{ secrets.CODESIGN_TIMESTAMP_URL }}
        run: |
          $signTool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signTool) {
            $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signTool) {
            throw "signtool.exe nao encontrado no runner."
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:CODESIGN_TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:CODESIGN_TIMESTAMP_URL }
          & $signTool sign `
            /f "$env:RUNNER_TEMP\codesign.pfx" `
            /p "$env:CODESIGN_PFX_PASSWORD" `
            /fd SHA256 `
            /tr "$timestampUrl" `
            /td SHA256 `
            "dist\CoordenacaoOP.exe"

      - name: Verify signature
        if: steps.detect-signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signTool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signTool) {
            $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signTool) {
            throw "signtool.exe nao encontrado no runner."
          }
          & $signTool verify /pa /v "dist\CoordenacaoOP.exe"

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CoordenacaoOP.exe -DestinationPath dist/CoordenacaoOP-windows.zip

      - name: Upload windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts
          path: dist/CoordenacaoOP-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    env:
      COORDENACAOOP_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set release version file
        run: |
          echo -n "${{ github.ref_name }}" > VERSION

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget

      - name: Build AppImage
        run: |
          chmod +x scripts/build_linux_appimage.sh
          ./scripts/build_linux_appimage.sh

      - name: Upload linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-artifacts
          path: dist/CoordenacaoOP-x86_64.AppImage

  build-modern-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: modern-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: modern-ui
        run: npm ci

      - name: Validate updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Configure o secret TAURI_SIGNING_PRIVATE_KEY para gerar releases com self-update."
          }

      - name: Build Tauri updater artifacts
        working-directory: modern-ui
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = (Get-Content modern-ui/package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem modern-ui/src-tauri/target/release/bundle/nsis/*_x64-setup.exe | Select-Object -First 1
          $signature = Get-Item "$($installer.FullName).sig"
          ./scripts/generate_tauri_latest_json.ps1 `
            -Version $version `
            -Tag "${{ github.ref_name }}" `
            -Repository "${{ github.repository }}" `
            -InstallerPath $installer.FullName `
            -SignaturePath $signature.FullName `
            -OutputPath modern-ui/src-tauri/target/release/bundle/nsis/latest.json

      - name: Upload modern windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: modern-windows-artifacts
          path: |
            modern-ui/src-tauri/target/release/bundle/nsis/*_x64-setup.exe
            modern-ui/src-tauri/target/release/bundle/nsis/*_x64-setup.exe.sig
            modern-ui/src-tauri/target/release/bundle/nsis/latest.json

  publish:
    needs: [build-windows, build-linux, build-modern-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-artifacts
          path: artifacts

      - name: Download linux artifact
        uses: actions/download-artifact@v5
        with:
          name: linux-artifacts
          path: artifacts

      - name: Download modern windows artifact
        uses: actions/download-artifact@v5
        with:
          name: modern-windows-artifacts
          path: artifacts

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Prepare release notes
        run: |
          if [ "${{ needs.build-windows.outputs.signing-enabled }}" != "true" ]; then
            printf '%s\n' \
              'Aviso: o binario Windows (CoordenacaoOP.exe) pode estar sem assinatura digital Authenticode.' \
              'Dependendo das configuracoes do Windows/SmartScreen, pode aparecer alerta de aplicativo nao reconhecido.' \
              > artifacts/RELEASE_NOTES.txt
          else
            : > artifacts/RELEASE_NOTES.txt
          fi

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/RELEASE_NOTES.txt
          files: |
            artifacts/*
          generate_release_notes: true
